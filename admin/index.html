<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Content Manager</title>
  </head>
  <body>
    <div id="nc-root"></div>
    <script src="https://unpkg.com/decap-cms@3.6.4/dist/decap-cms.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        if (window.CMS) {
          CMS.init({
        config: {
          backend: {
            name: 'github',
            repo: 'Arbutus-Code/arbutus-jekyll-demo',
            branch: 'main',
            base_url: 'https://oauth.arbutuscode.ca',
            auth_endpoint: 'auth',
            site_domain: 'https://jekyll.arbutuscode.ca',
            auth_type: 'implicit'
          },
          media_folder: "assets/images/uploads",
          public_folder: "/assets/images/uploads",
          collections: [
            {
              name: "test_posts",
              label: "Test Posts",
              folder: "_test_posts",
              create: true,
              fields: [
                { label: "Title", name: "title", widget: "string" },
                { label: "Body", name: "body", widget: "markdown" }
              ]
            }
          ]
        }
      });
        } else {
          console.error("Decap CMS object (CMS) not found. Initialization failed.");
          var rootDiv = document.getElementById('nc-root');
          if (rootDiv) {
            rootDiv.innerHTML = '<p style="padding: 20px; text-align: center; font-family: sans-serif;">Error: Decap CMS could not be loaded. Please check the console.</p>';
          }
        }
      });
    </script>
  </body>
</html>
