<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Content Manager</title>
  </head>
  <body>
    <div id="nc-root"></div> <!-- Explicit root element for Decap CMS -->
    <script>
      // Manual Decap CMS Initialization
      CMS.init({
        config: {
          backend: {
            name: 'github',
            repo: 'Arbutus-Code/arbutus-jekyll-demo', // Ensure this is correct
            branch: 'main',                          // Ensure this is correct
            base_url: 'https://oauth.arbutuscode.ca',
            auth_endpoint: 'auth',
            site_domain: 'https://jekyll.arbutuscode.ca', // Domain of Decap CMS itself
            auth_type: 'implicit' // Explicitly set for postMessage flow
          },
          media_folder: "assets/images/uploads", // Decap requires this
          public_folder: "/assets/images/uploads", // Decap requires this
          collections: [
            {
              name: "test_posts",
              label: "Test Posts",
              folder: "_test_posts", // A temporary folder for testing
              create: true,
              fields: [
                { label: "Title", name: "title", widget: "string" },
                { label: "Body", name: "body", widget: "markdown" }
              ]
            }
          ]
        }
      });
    </script>
  </body>
</html>
