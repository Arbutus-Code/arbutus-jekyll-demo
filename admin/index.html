<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Content Manager</title>
    <style>
      #debug-panel {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        background: rgba(0,0,0,0.8);
        color: #00ff00;
        font-family: monospace;
        padding: 10px;
        max-height: 200px;
        overflow-y: auto;
        z-index: 9999;
      }
      #debug-logs {
        margin: 0;
        padding: 0;
        list-style: none;
      }
      #debug-logs li {
        margin-bottom: 5px;
        border-bottom: 1px solid rgba(255,255,255,0.2);
        padding-bottom: 5px;
      }
      .debug-timestamp {
        color: #aaaaaa;
        margin-right: 10px;
      }
      .debug-error {
        color: #ff5555;
      }
    </style>
    <!-- Inline configuration to avoid potential config.yml loading issues -->
    <script>
      window.CMS_MANUAL_INIT = true;
    </script>
  </head>
  <body>
    <!-- Debug panel to show initialization logs -->
    <div id="debug-panel">
      <h3>Netlify CMS Debug Panel</h3>
      <ul id="debug-logs"></ul>
    </div>

    <!-- Load Netlify CMS -->
    <script src="https://unpkg.com/netlify-cms@2.10.192/dist/netlify-cms.js"></script>
    
    <!-- Debug script with manual initialization -->
    <script>
      // Debug logging function
      function debugLog(message, isError = false) {
        const logsList = document.getElementById('debug-logs');
        const logItem = document.createElement('li');
        const timestamp = document.createElement('span');
        timestamp.className = 'debug-timestamp';
        timestamp.textContent = new Date().toISOString().substr(11, 8);
        
        logItem.appendChild(timestamp);
        
        const messageSpan = document.createElement('span');
        messageSpan.className = isError ? 'debug-error' : '';
        messageSpan.textContent = message;
        logItem.appendChild(messageSpan);
        
        logsList.appendChild(logItem);
        console.log(`[DEBUG] ${message}`);
        if (isError) console.error(`[DEBUG ERROR] ${message}`);
      }

      // Initial log
      debugLog('Debug panel initialized');
      
      // Register a manual event listener for auth messages
      debugLog('Setting up manual message event listener...');
      window.addEventListener('message', function(event) {
        debugLog(`Received message event from ${event.origin}`);
        try {
          const data = JSON.stringify(event.data).substring(0, 100);
          debugLog(`Message data: ${data}...`);
          
          // If this is an auth message, try to log more details
          if (typeof event.data === 'string' && event.data.includes('authorization:')) {
            debugLog('Auth message detected!');
          }
        } catch (e) {
          debugLog(`Error processing message: ${e.message}`, true);
        }
      });
      
      // Monitor CMS initialization
      window.addEventListener('load', function() {
        debugLog('Window loaded, starting manual initialization...');
        
        try {
          // Manual initialization with inline config
          const config = {
            backend: {
              name: 'github',
              repo: 'Arbutus-Code/arbutus-jekyll-demo',
              branch: 'main',
              base_url: 'https://oauth.arbutuscode.ca'
            },
            media_folder: 'assets/images/uploads',
            collections: [
              {
                name: 'pages',
                label: 'Pages',
                folder: '_pages',
                create: true,
                fields: [
                  { label: 'Title', name: 'title', widget: 'string' },
                  { label: 'Body', name: 'body', widget: 'markdown' }
                ]
              }
            ]
          };
          
          debugLog('Manual config created, initializing CMS...');
          window.CMS.init({ config });
          debugLog('CMS.init called');
          
          // Check if CMS object exists
          if (window.CMS) {
            debugLog('CMS object found!');
            
            // Check for auth property
            setTimeout(() => {
              if (window.CMS.auth) {
                debugLog('CMS.auth exists!');
                debugLog(`CMS.auth properties: ${Object.keys(window.CMS.auth).join(', ')}`);
              } else {
                debugLog('CMS.auth is undefined!', true);
              }
              
              // Check backend
              try {
                const backend = window.CMS.getBackend && window.CMS.getBackend();
                if (backend) {
                  debugLog(`Backend found: ${backend.name}`);
                } else {
                  debugLog('No backend available from CMS.getBackend()', true);
                }
              } catch (e) {
                debugLog(`Error checking backend: ${e.message}`, true);
              }
            }, 1000);
          } else {
            debugLog('CMS object not found! CMS failed to initialize.', true);
          }
        } catch (e) {
          debugLog(`Error during initialization: ${e.message}`, true);
        }
      });
      
      // Monitor for errors during initialization
      window.addEventListener('error', function(event) {
        debugLog(`Global error: ${event.message} at ${event.filename}:${event.lineno}`, true);
      });
    </script>
  </body>
</html>
