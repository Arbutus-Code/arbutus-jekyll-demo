<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Content Manager</title>
    <style>
      #debug-panel {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        background: rgba(0,0,0,0.8);
        color: #00ff00;
        font-family: monospace;
        padding: 10px;
        max-height: 200px;
        overflow-y: auto;
        z-index: 9999;
      }
      #debug-panel h3 {
        margin: 0 0 10px 0;
        color: #ffffff;
      }
      #debug-logs {
        margin: 0;
        padding: 0;
        list-style: none;
      }
      #debug-logs li {
        margin-bottom: 5px;
        border-bottom: 1px solid rgba(255,255,255,0.2);
        padding-bottom: 5px;
      }
      .debug-timestamp {
        color: #aaaaaa;
        margin-right: 10px;
      }
      .debug-error {
        color: #ff5555;
      }
      .login-button {
        display: block;
        margin: 20px auto;
        padding: 10px 20px;
        background-color: #24292e;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 16px;
        cursor: pointer;
      }
      .login-button:hover {
        background-color: #0366d6;
      }
      .center-content {
        text-align: center;
        margin-top: 100px;
      }
    </style>
  </head>
  <body>
    <!-- Manual login UI -->
    <div class="center-content">
      <h1>Decap CMS Admin</h1>
      <p>The standard CMS initialization failed. Try the manual login button below:</p>
      <button id="manual-login" class="login-button">Login with GitHub</button>
    </div>

    <!-- Debug panel to show initialization logs -->
    <div id="debug-panel">
      <h3>Decap CMS Debug Panel</h3>
      <ul id="debug-logs"></ul>
    </div>

    <!-- Load Decap CMS -->
    <script src="https://unpkg.com/decap-cms@3.3.2/dist/decap-cms.js"></script>
    
    <!-- Debug script with manual initialization -->
    <script>
      // Debug logging function
      function debugLog(message, isError = false) {
        const logsList = document.getElementById('debug-logs');
        const logItem = document.createElement('li');
        const timestamp = document.createElement('span');
        timestamp.className = 'debug-timestamp';
        timestamp.textContent = new Date().toISOString().substr(11, 8);
        
        logItem.appendChild(timestamp);
        
        const messageSpan = document.createElement('span');
        messageSpan.className = isError ? 'debug-error' : '';
        messageSpan.textContent = message;
        logItem.appendChild(messageSpan);
        
        logsList.appendChild(logItem);
        console.log(`[DEBUG] ${message}`);
        if (isError) console.error(`[DEBUG ERROR] ${message}`);
      }

      // Initial log
      debugLog('Debug panel initialized');
      
      // Monitor CMS initialization
      window.addEventListener('load', function() {
        debugLog('Window loaded, checking for CMS object...');
        
        // Check if CMS object exists
        if (window.CMS) {
          debugLog('CMS object found!');
          
          try {
            // Try to manually initialize the GitHub backend
            debugLog('Attempting manual backend registration...');
            
            // Define the config manually
            const config = {
              backend: {
                name: 'github',
                repo: 'Arbutus-Code/arbutus-jekyll-demo',
                branch: 'main',
                base_url: 'https://oauth.arbutuscode.ca',
                auth_endpoint: 'auth',
                site_domain: 'https://jekyll.arbutuscode.ca',
                auth_type: 'implicit'
              },
              media_folder: 'assets/images/uploads',
              collections: []
            };
            
            debugLog('Manual config created');
            
            // Try to initialize with this config
            if (typeof window.CMS.init === 'function') {
              debugLog('Calling CMS.init with manual config...');
              window.CMS.init({ config });
              debugLog('CMS.init called successfully');
            } else {
              debugLog('CMS.init is not a function', true);
            }
            
            // Check if auth is now defined
            setTimeout(() => {
              if (window.CMS.auth) {
                debugLog('Success! CMS.auth now exists after manual init');
                debugLog(`CMS.auth properties: ${Object.keys(window.CMS.auth).join(', ')}`);
              } else {
                debugLog('CMS.auth still undefined after manual init', true);
              }
            }, 1000);
            
          } catch (e) {
            debugLog(`Error during manual initialization: ${e.message}`, true);
          }
          
          // Register a manual event listener for auth messages
          debugLog('Setting up manual message event listener...');
          window.addEventListener('message', function(event) {
            debugLog(`Received message event from ${event.origin}`);
            try {
              if (typeof event.data === 'string' && event.data.includes('authorization:')) {
                debugLog(`Auth message detected: ${event.data.substring(0, 50)}...`);
                
                // Try to manually process the auth message
                const parts = event.data.split(':');
                if (parts.length >= 4) {
                  const provider = parts[1];
                  const status = parts[2];
                  const data = parts.slice(3).join(':');
                  
                  debugLog(`Provider: ${provider}, Status: ${status}`);
                  debugLog(`Data: ${data.substring(0, 30)}...`);
                  
                  if (status === 'success' && window.CMS.auth && window.CMS.auth.completeAuth) {
                    debugLog('Attempting to call CMS.auth.completeAuth...');
                    try {
                      const parsedData = JSON.parse(data);
                      window.CMS.auth.completeAuth(parsedData);
                      debugLog('CMS.auth.completeAuth called successfully');
                    } catch (e) {
                      debugLog(`Error calling completeAuth: ${e.message}`, true);
                    }
                  }
                }
              }
            } catch (e) {
              debugLog(`Error processing message: ${e.message}`, true);
            }
          });
          
          // Set up manual login button
          document.getElementById('manual-login').addEventListener('click', function() {
            debugLog('Manual login button clicked');
            try {
              const authURL = `https://github.com/login/oauth/authorize?client_id=Iv1.9d7d662ea6f19d74&scope=repo&redirect_uri=${encodeURIComponent('https://oauth.arbutuscode.ca/auth')}`;
              debugLog(`Redirecting to: ${authURL}`);
              window.location.href = authURL;
            } catch (e) {
              debugLog(`Error during manual login: ${e.message}`, true);
            }
          });
          
        } else {
          debugLog('CMS object not found! Decap CMS failed to initialize.', true);
        }
      });
      
      // Monitor for errors during initialization
      window.addEventListener('error', function(event) {
        debugLog(`Global error: ${event.message} at ${event.filename}:${event.lineno}`, true);
      });
    </script>
  </body>
</html>
