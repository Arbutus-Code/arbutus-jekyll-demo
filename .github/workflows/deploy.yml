name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      DECAP_CMS_GITHUB_CLIENT_ID: ${{ secrets.DECAP_CMS_GITHUB_CLIENT_ID }}
      DECAP_CMS_GITHUB_CLIENT_SECRET: ${{ secrets.DECAP_CMS_GITHUB_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v3

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Create GitHub Actions Gemfile
        run: |
          cat > Gemfile.github-actions << EOL
          source "https://rubygems.org"
          gem "jekyll", "~> 4.3.0"
          gem "webrick"
          gem "bigdecimal"
          gem "csv"
          gem "logger"
          gem "base64"
          gem "arbutus-theme", github: "Arbutus-Code/arbutus-jekyll-theme", branch: "main"
          group :jekyll_plugins do
            gem "jekyll-feed"
            gem "jekyll-seo-tag"
          end
          EOL
          mv Gemfile.github-actions Gemfile

      - name: Build site
        run: |
          bundle install
          bundle exec jekyll build

      - name: Deploy with rsync over SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_KEY }}
        run: |
          echo "$SSH_PRIVATE_KEY" > private_key.pem
          chmod 600 private_key.pem

          rsync -avz --delete -e "ssh -i private_key.pem -p ${{ secrets.PORT }} -o StrictHostKeyChecking=no" \
            ./_site/ ${{ secrets.USERNAME }}@${{ secrets.HOST }}:${{ secrets.TARGET }}

          rm -f private_key.pem
