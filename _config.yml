title: Arbutus Code
description: Protecting Vancouver Island's iconic native trees
logo: assets/images/arbutus-tree-black.svg
footer_logo: assets/images/arbutus-tree-white.svg
baseurl: ""
url: "https://jekyll.arbutuscode.ca"
permalink: pretty
favicons:
  - rel: icon
    type: image/x-icon
    href: /favicon.ico
  - rel: icon
    type: image/svg+xml
    href: /favicon.svg
  - rel: icon
    type: image/png
    sizes: 32x32
    href: /favicon-32x32.png
  - rel: icon
    type: image/png
    sizes: 16x16
    href: /favicon-16x16.png
  - rel: apple-touch-icon
    sizes: 180x180
    href: /apple-touch-icon.png
  - rel: manifest
    href: /site.webmanifest

# Default manifest icons (used if not set in CMS)
default_manifest_icons:
  - src: "/android-chrome-192x192.png"
    sizes: "192x192"
    type: "image/png"
  - src: "/android-chrome-512x512.png"
    sizes: "512x512"
    type: "image/png"
  - rel: icon
    type: image/png
    sizes: 512x512
    href: /android-chrome-512x512.png
  - rel: icon
    type: image/png
    sizes: 192x192
    href: /android-chrome-192x192.png
